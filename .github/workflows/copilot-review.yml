name: Copilot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main", "dev"]

jobs:
  copilot-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Request Copilot code review
        uses: github/copilot-code-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
